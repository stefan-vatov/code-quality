[lints.rust]
unsafe_code = "forbid"
missing_docs = "deny"
missing_debug_implementations = "deny"
unused_must_use = "deny"
unused_mut = "deny"
non_exhaustive_omitted_patterns = "deny"
unused_crate_dependencies = "deny"

[lints.clippy]
clippy::wildcard_enum_match_arm = "deny"
clippy::print_stdout = "deny"
clippy::print_stderr = "deny"
clippy::todo = "deny"
all = "deny"
pedantic = "deny"
nursery = "deny"
cargo = "deny"
unwrap_used = "deny"
expect_used = "deny"
unused_result_ok = "deny"
as_conversions = "deny"
too_many_lines = "deny"
