[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "deny"
missing_debug_implementations = "deny"
unused_must_use = "deny"
unused_mut = "deny"
unused_crate_dependencies = "deny"

[workspace.lints.clippy]
wildcard_enum_match_arm = "deny"
print_stdout = "deny"
print_stderr = "deny"
todo = "deny"
all = "deny"
pedantic = "deny"
nursery = "deny"
cargo = "deny"
unwrap_used = "deny"
expect_used = "deny"
unused_result_ok = "deny"
as_conversions = "deny"
too_many_lines = "deny"
