name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(release): publish'))
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    outputs:
      elixir_released: ${{ steps.plan.outputs.elixir_released }}
      elixir_sha: ${{ steps.plan.outputs.elixir_sha }}
      elixir_tag: ${{ steps.plan.outputs.elixir_tag }}
      elixir_version: ${{ steps.plan.outputs.elixir_version }}
      has_releases: ${{ steps.plan.outputs.has_releases }}
      release_sha: ${{ steps.commit.outputs.release_sha }}
      rust_released: ${{ steps.plan.outputs.rust_released }}
      rust_sha: ${{ steps.plan.outputs.rust_sha }}
      rust_tag: ${{ steps.plan.outputs.rust_tag }}
      rust_version: ${{ steps.plan.outputs.rust_version }}
      ts_released: ${{ steps.plan.outputs.ts_released }}
      ts_sha: ${{ steps.plan.outputs.ts_sha }}
      ts_tag: ${{ steps.plan.outputs.ts_tag }}
      ts_version: ${{ steps.plan.outputs.ts_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.4 --activate

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.3'
          elixir-version: '1.18.4'

      - name: Install Hex
        run: mix local.hex --force

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate current commit
        run: |
          pnpm run lint:ci
          pnpm run knip:ci
          pnpm run check
          pnpm run test:projects
          pnpm run build
          pnpm nx run-many -t pack

      - name: Plan and apply release metadata
        id: plan
        run: node scripts/release-plan.mjs prepare --github-output "$GITHUB_OUTPUT"

      - name: Stop when no packages need release
        if: steps.plan.outputs.has_releases != 'true'
        run: echo "No package releases detected."

      - name: Format release metadata
        if: steps.plan.outputs.has_releases == 'true'
        run: pnpm run format

      - name: Validate release metadata commit
        if: steps.plan.outputs.has_releases == 'true'
        run: |
          pnpm run lint:ci
          pnpm run knip:ci
          pnpm run check
          pnpm run test:projects
          pnpm run build
          pnpm nx run-many -t pack

      - name: Commit release metadata
        id: commit
        if: steps.plan.outputs.has_releases == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ts/package.json rust/Cargo.toml rust/Cargo.lock elixir/mix.exs
          for path in ts/CHANGELOG.md rust/CHANGELOG.md elixir/CHANGELOG.md; do
            if [ -f "$path" ]; then
              git add "$path"
            fi
          done
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): publish [skip ci]"
            git push origin HEAD:main
          fi
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload release plan
        if: steps.plan.outputs.has_releases == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-plan
          path: release-plan.json
          if-no-files-found: error

  publish-npm:
    name: publish npm
    needs: prepare
    if: needs.prepare.outputs.ts_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ts_sha || needs.prepare.outputs.release_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish package
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.ts_version }}
        run: |
          if npm view "@thethracian/oxlint-config@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "@thethracian/oxlint-config@$PACKAGE_VERSION is already published."
            exit 0
          fi
          pnpm --dir ts build
          cd ts
          npm publish --access public

  verify-published-npm-consumption:
    name: verify published npm consumption
    needs:
      - prepare
      - publish-npm
    if: needs.publish-npm.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.4 --activate

      - name: Update root consumer dependency to the published package
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.ts_version }}
        run: |
          npm view "@thethracian/oxlint-config@$PACKAGE_VERSION" version
          pnpm add --save-dev --lockfile-only "@thethracian/oxlint-config@npm:@thethracian/oxlint-config@$PACKAGE_VERSION"

      - name: Open published package verification PR
        env:
          GH_TOKEN: ${{ secrets.PUBLISHED_CONFIG_PR_TOKEN }}
          PACKAGE_VERSION: ${{ needs.prepare.outputs.ts_version }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PUBLISHED_CONFIG_PR_TOKEN is required so the PR triggers normal CI checks."
            exit 1
          fi

          branch="codex/verify-published-oxlint-config-$PACKAGE_VERSION"
          title="ci(ts): verify published oxlint config"
          body="Updates the repository's consumer-style TypeScript lint dependency to @thethracian/oxlint-config@$PACKAGE_VERSION so normal PR checks verify the package exactly as downstream projects consume it."

          if gh pr view "$branch" --json url --jq .url >/dev/null 2>&1; then
            gh pr view "$branch" --json url --jq .url
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add package.json pnpm-lock.yaml

          if git diff --cached --quiet; then
            echo "Root consumer dependency already points at @thethracian/oxlint-config@$PACKAGE_VERSION."
            exit 0
          fi

          git commit -m "$title"
          git push "https://x-access-token:$GH_TOKEN@github.com/${GITHUB_REPOSITORY}.git" "$branch"
          gh pr create --base main --head "$branch" --title "$title" --body "$body"

  publish-crate:
    name: publish crate
    needs: prepare
    if: needs.prepare.outputs.rust_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.rust_sha || needs.prepare.outputs.release_sha }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Request crates.io trusted publishing token
        id: crates-auth
        if: env.CARGO_REGISTRY_TOKEN == ''
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.rust_version }}
          TRUSTED_PUBLISHING_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          if curl --fail --silent --show-error "https://crates.io/api/v1/crates/cargo-thx-lint/$PACKAGE_VERSION" >/dev/null; then
            echo "cargo-thx-lint@$PACKAGE_VERSION is already published."
            exit 0
          fi
          export CARGO_REGISTRY_TOKEN="${CARGO_REGISTRY_TOKEN:-$TRUSTED_PUBLISHING_TOKEN}"
          cargo publish --manifest-path rust/Cargo.toml --locked

  publish-hex:
    name: publish hex
    needs: prepare
    if: needs.prepare.outputs.elixir_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.elixir_sha || needs.prepare.outputs.release_sha }}

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.3'
          elixir-version: '1.18.4'

      - name: Publish package
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          PACKAGE_VERSION: ${{ needs.prepare.outputs.elixir_version }}
        run: |
          if curl --fail --silent --show-error "https://hex.pm/api/packages/the_thracian_credo/releases/$PACKAGE_VERSION" >/dev/null; then
            echo "the_thracian_credo@$PACKAGE_VERSION is already published."
            exit 0
          fi
          cd elixir
          mix local.hex --force
          mix deps.get
          mix hex.publish package --yes

  tag:
    name: tag published releases
    needs:
      - prepare
      - publish-npm
      - publish-crate
      - publish-hex
    if: >-
      always() &&
      needs.prepare.outputs.has_releases == 'true' &&
      needs.prepare.result == 'success' &&
      (needs.publish-npm.result == 'success' || needs.publish-npm.result == 'skipped') &&
      (needs.publish-crate.result == 'success' || needs.publish-crate.result == 'skipped') &&
      (needs.publish-hex.result == 'success' || needs.publish-hex.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          fetch-depth: 0

      - name: Create and push package tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          create_tag() {
            tag="$1"
            ref="$2"
            if [ -z "$tag" ]; then
              return
            fi
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "$tag already exists."
            else
              git tag "$tag" "$ref"
            fi
          }
          create_tag "${{ needs.prepare.outputs.ts_tag }}" "${{ needs.prepare.outputs.ts_sha || needs.prepare.outputs.release_sha }}"
          create_tag "${{ needs.prepare.outputs.rust_tag }}" "${{ needs.prepare.outputs.rust_sha || needs.prepare.outputs.release_sha }}"
          create_tag "${{ needs.prepare.outputs.elixir_tag }}" "${{ needs.prepare.outputs.elixir_sha || needs.prepare.outputs.release_sha }}"
          git push origin --tags
